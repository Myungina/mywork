<body>
    <code>
        <a href="javascript:void(0);" onclick="openCurriculum('12345678', '001001')" class="gray">커리큘럼</a>

<script>
//모바일 커리큘럼 
function openCurriculum(it_id, cat_id){
        $.post('/curriculum.php',{
            it_id:it_id,
            cat_id:cat_id
        },function(html){
            $('#lecInfo #curriculum_area').html(html);
            $('#lecInfo').show();
            $('body').addClass('stop-scrolling');
        });
}
</script>
