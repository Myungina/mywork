    let certificationsDB = {}; // API에서 로드됨
    let examInfoDB = {}; // API에서 로드됨
    let isDataLoaded = false;

    // API 호출 함수
    async function loadDataFromAPI() {
        try {
            console.log('📡 API에서 데이터 로드 중...');

            // 두 API를 병렬로 호출
            const [certsResponse, examResponse] = await Promise.all([
                fetch('../api/certifications.php'),
                fetch('../api/exam_info.php')
            ]);

            if (!certsResponse.ok || !examResponse.ok) {
                throw new Error('API 호출 실패');
            }

            const certsData = await certsResponse.json();
            const examData = await examResponse.json();

            if (!certsData.success || !examData.success) {
                throw new Error('데이터 로드 실패');
            }

            certificationsDB = certsData.data;
            examInfoDB = examData.data;
            isDataLoaded = true;

            console.log(`✅ 데이터 로드 완료: 자격증 ${certsData.count}개, 시험정보 ${examData.count}개`);

            return true;
        } catch (error) {
            console.error('❌ 데이터 로드 실패:', error);
            return false;
        }
    }

    function generateAIAnalysisText(cert, userProfile, isFromSearch = false) {
        // 전체 자격증 검색에서는 AI 분석 제외
        if (isFromSearch) return [];

        const lines = [];
        const score = cert.score || 0;

        const monthlyHours = cert.monthlyHours?.recommended || 60;
        const passRate = cert.passRate?.overall || 30;
        const cost = cert.cost?.total || "50~100만원";
        const salary = cert.salary?.entry || 3000;
        const outlook = cert.outlook || 3;
        const outlookText = outlook >= 4 ? "매우 좋음" : outlook >= 3 ? "좋음" : "보통";

        // ===== 2. 시험 정보 및 과목 안내 =====

        }

        // ===== 3. 준비 기간 및 학습량 분석 =====
        lines.push(`[준비 기간 분석] 권장 준비 기간은 ${cert.duration?.min || 3}~${cert.duration?.max || 12}개월이며, 최적 학습 기간은 ${duration}개월입니다. 귀하의 현재 학습 여건을 고려할 때 현실적인 합격 도전이 가능합니다.`);

        if (monthlyHours >= 80) {
            lines.push(`[학습량 주의] 월 ${monthlyHours}시간 이상의 집중 학습이 요구되는 고난도 시험입니다. 하루 평균 ${Math.round(monthlyHours / 30 * 10) / 10}시간 이상의 꾸준한 학습과 철저한 시간 관리 전략이 필수입니다.`);
        } else if (monthlyHours >= 50) {
            lines.push(`[학습량 안내] 월 ${monthlyHours}시간 정도의 꾸준한 학습이 권장됩니다. 하루 평균 ${Math.round(monthlyHours / 30 * 10) / 10}시간 학습으로 계획적인 시간 배분이 중요합니다.`);
        } else {
            lines.push(`[학습량 안내] 월 ${monthlyHours}시간 정도의 학습량으로, 다른 자격증 대비 비교적 부담 없이 준비할 수 있는 수준입니다.`);
        }

        // ===== 4. 사용자 상황별 맞춤 전략 =====
        if (userProfile?.employment === "직장인") {
            lines.push(`[직장인 맞춤 전략] 직장과 병행 시 학습 지속성이 합격률에 큰 영향을 미칩니다. 평일 야간 2시간 + 주말 집중 학습 패턴을 권장하며, 출퇴근 시간을 활용한 이론 암기가 효과적입니다.`);
        } else if (userProfile?.employment === "취준생/이직준비") {
            lines.push(`[취준생 맞춤 전략] 집중 학습이 가능한 최적의 시기입니다. 하루 6~8시간 풀타임 학습으로 단기 합격을 목표로 하고, 체계적인 커리큘럼 이행을 통해 최단 기간 합격을 노려보세요.`);
        } else if (userProfile?.employment === "학생") {

        } else if (userProfile?.employment === "주부/경단녀") {
            lines.push(`[경력단절자 맞춤 전략] 가사와 병행 가능한 유연한 학습 계획이 중요합니다. 오전 시간대 집중 학습, 온라인 강의 활용으로 효율적인 시간 관리가 가능합니다.`);

        // ===== 5. 합격 전략 및 학습 팁 =====
        if (examInfo?.studyTip) {

        }

        // ===== 6. 합격률 및 경쟁 분석 =====
        if (passRate) {
            if (passRate < 20) {
                lines.push(`[합격률 분석] 전체 합격률 ${passRate}%로 난이도가 높은 시험입니다. 그러나 체계적인 준비와 충분한 학습 시간 확보 시 평균 대비 합격 확률을 크게 높일 수 있습니다.`);
            } else if (passRate < 40) {
                lines.push(`[합격률 분석] 전체 합격률 ${passRate}%로 적정 수준의 경쟁률을 보입니다. 핵심 과목 집중 공략과 기출문제 분석으로 충분히 합격 가능합니다.`);
            } else {
                lines.push(`[합격률 분석] 전체 합격률 ${passRate}%로 비교적 높은 편입니다. 기본기에 충실하고 꾸준히 학습하면 합격 가능성이 높습니다.`);
            }
        }

        // ===== 7. 비용 대비 효과 분석 =====
        lines.push(`[투자 비용 분석] 총 예상 비용 ${cost}(교재+강의+응시료 포함)은 자격증 취득 후 예상 수익 대비 합리적인 투자입니다.`);

        // ===== 8. 진로 및 전망 =====
        if (examInfo?.careerPath) {
            lines.push(`[진로 및 활용] ${examInfo.careerPath}`);
        }

        if (typeof salary === 'number') {
            lines.push(`[소득 전망] 신입 기준 초봉 약 ${salary.toLocaleString()}만원으로, 경력에 따라 상승 가능성이 높습니다. 직업 전망 '${outlookText}' 평가는 장기 커리어 측면에서 긍정적인 신호입니다.`);
        }

        // ===== 9. 자격증 취득의 이점 =====
        if (examInfo?.advantage) {
            lines.push(`[취득 이점] ${examInfo.advantage}`);
        }

        // ===== 10. 관련 분야 경험 가산 =====
        if (cert.tags?.some(t => ["법률", "보험", "금융", "회계", "세무"].includes(t))) {
            lines.push(`[관련 경험 분석] 법률, 금융, 회계 분야 경험이나 관련 전공 이수자의 경우 학습 효율이 30% 이상 높아질 것으로 분석됩니다.`);
        } else if (cert.tags?.some(t => ["IT", "데이터", "프로그래밍"].includes(t))) {
            lines.push(`[관련 경험 분석] IT, 프로그래밍 경험이 있다면 실기 과목에서 큰 강점이 될 수 있습니다. 기초 코딩 능력이 합격에 유리합니다.`);
        } else if (cert.tags?.some(t => ["안전", "소방", "전기"].includes(t))) {
            lines.push(`[관련 경험 분석] 현장 실무 경험이 있다면 이론 이해도가 높고, 실기 시험에서도 유리합니다. 관련 산업체 근무 경력은 큰 자산입니다.`);
        }

        // ===== 11. 종합 결론 =====
        if (score >= 70) {
            lines.push(`[종합 결론] 귀하의 조건은 ${cert.name} 준비에 매우 적합합니다. 체계적인 학습 계획 수립과 꾸준한 실행으로 목표 달성이 충분히 가능합니다. 지금 바로 시작하시기를 강력히 권장합니다!`);
        } else if (score >= 50) {
            lines.push(`[종합 결론] 충분한 준비 기간과 학습 관리가 가능하다면 ${cert.name}은 도전 가치가 높은 자격증입니다. 약점 보완에 집중하고 강점을 살리는 전략으로 합격을 목표하세요.`);
        } else {
            lines.push(`[종합 결론] ${cert.name}은 현재 조건에서 다소 도전적일 수 있으나, 충분한 준비 기간을 확보하고 관련 기초 지식을 쌓는다면 합격 가능성을 높일 수 있습니다. 기초부터 차근차근 준비해 보세요.`);
        }

        return lines;
    }

    // 타이핑 효과 컴포넌트
    function TypingText({lines, isActive}) {
        const [displayedLines, setDisplayedLines] = useState([]);
        const [currentLineIndex, setCurrentLineIndex] = useState(0);
        const [currentCharIndex, setCurrentCharIndex] = useState(0);
        const [isComplete, setIsComplete] = useState(false);
        const [showCursor, setShowCursor] = useState(true);
        const containerRef = useRef(null);

        useEffect(() => {
            if (!isActive || !lines || lines.length === 0) {
                setDisplayedLines([]);
                setCurrentLineIndex(0);
                setCurrentCharIndex(0);
                setIsComplete(false);
                return;
            }

            // 커서 깜빡임
            const cursorInterval = setInterval(() => {
                setShowCursor(prev => !prev);
            }, 500);

            return () => clearInterval(cursorInterval);
        }, [isActive, lines]);

        useEffect(() => {
            if (!isActive || !lines || lines.length === 0 || isComplete) return;

            if (currentLineIndex >= lines.length) {
                setIsComplete(true);
                return;
            }

            const currentLine = lines[currentLineIndex];

            if (currentCharIndex < currentLine.length) {
                const timeout = setTimeout(() => {
                    setDisplayedLines(prev => {
                        const newLines = [...prev];
                        if (newLines.length <= currentLineIndex) {
                            newLines.push(currentLine.slice(0, currentCharIndex + 1));
                        } else {
                            newLines[currentLineIndex] = currentLine.slice(0, currentCharIndex + 1);
                        }
                        return newLines;
                    });
                    setCurrentCharIndex(prev => prev + 1);
                }, 25); // 타이핑 속도

                return () => clearTimeout(timeout);
            } else {
                // 다음 줄로 이동
                const timeout = setTimeout(() => {
                    setCurrentLineIndex(prev => prev + 1);
                    setCurrentCharIndex(0);
                }, 300); // 줄 간 딜레이

                return () => clearTimeout(timeout);
            }
        }, [isActive, lines, currentLineIndex, currentCharIndex, isComplete]);

        // 자동 스크롤
        useEffect(() => {
            if (containerRef.current) {
                containerRef.current.scrollTop = containerRef.current.scrollHeight;
            }
        }, [displayedLines]);

        if (!isActive || !lines || lines.length === 0) return null;

        // [] 안의 내용을 볼드 처리하는 함수
        const formatLine = (text) => {
            const parts = text.split(/(\[[^\]]+\])/g);
            return parts.map((part, i) => {
                if (part.startsWith('[') && part.endsWith(']')) {
                    return <strong key={i} className="text-violet-700 font-bold">{part.slice(1, -1)}</strong>;
                }
                return <span key={i}>{part}</span>;
            });
        };

        return (
            <div ref={containerRef} className="space-y-3">
                {displayedLines.map((line, idx) => (
                    <p key={idx} className="text-gray-700 text-base leading-relaxed flex items-start gap-3">
                        <span className="text-violet-500 mt-1 flex-shrink-0">•</span>
                        <span className="flex-1">
                {formatLine(line)}
                            {idx === displayedLines.length - 1 && !isComplete && (
                                <span
                                    className={`inline-block w-0.5 h-5 bg-violet-500 ml-0.5 align-middle ${showCursor ? 'opacity-100' : 'opacity-0'}`}></span>
                            )}
              </span>
                    </p>
                ))}
                {!isComplete && displayedLines.length === 0 && (
                    <div className="flex items-center gap-3 text-violet-600 py-4">
                        <div className="flex gap-1.5">
                            <span className="w-2.5 h-2.5 bg-violet-500 rounded-full animate-bounce"
                                  style={{animationDelay: '0ms'}}></span>
                            <span className="w-2.5 h-2.5 bg-violet-500 rounded-full animate-bounce"
                                  style={{animationDelay: '150ms'}}></span>
                            <span className="w-2.5 h-2.5 bg-violet-500 rounded-full animate-bounce"
                                  style={{animationDelay: '300ms'}}></span>
                        </div>
                        <span className="text-base font-medium">AI가 귀하의 조건을 분석하고 있습니다...</span>
                    </div>
                )}
            </div>
        );
    }

    // ========================================
    // AI 추천 알고리즘
    // ========================================
    function getAdvancedRecommendations(userProfile) {
        const {background, duration, employment, dailyHours, interests, goal, budget} = userProfile;
        const monthlyHours = dailyHours * 22;
        const durationMap = {"3개월": 3, "6개월": 6, "12개월": 12, "24개월": 24, "36개월 이상": 36};
        const durationMonths = durationMap[duration] || 12;
        const budgetMap = {"50만원 이하": 50, "100만원": 100, "200만원": 200, "300만원": 300, "제한없음": 999};
        const maxBudget = budgetMap[budget] || 999;

        const results = [];

        Object.entries(certificationsDB).forEach(([name, cert]) => {
            let score = 0;
            let reasons = [];
            let warnings = [];
            let highlights = [];

            // 1. 시간 적합성 (25점)
            const requiredHours = cert.monthlyHours?.recommended || 60;
            const hourRatio = monthlyHours / requiredHours;
            if (hourRatio >= 1.2) {
                score += 25;
                reasons.push("✅ 충분한 학습 시간");
                highlights.push("시간 여유");
            } else if (hourRatio >= 1.0) {
                score += 22;
                reasons.push("✅ 적정 학습 시간");
            } else if (hourRatio >= 0.8) {
                score += 18;
                reasons.push("⚠️ 시간 관리 필요");
            } else if (hourRatio >= 0.6) {
                score += 12;
                warnings.push("시간 부족");
            } else {
                score += 5;
                warnings.push("시간 크게 부족");
            }

            // 2. 기간 적합성 (20점)
            const certDurationOpt = cert.duration?.optimal || 6;
            const certDurationMin = cert.duration?.min || 3;
            if (durationMonths >= certDurationOpt) {
                score += 20;
                reasons.push("✅ 충분한 준비 기간");
                highlights.push("기간 충분");
            } else if (durationMonths >= certDurationMin) {
                score += 15;
                reasons.push("✅ 집중 학습 시 가능");
            } else if (durationMonths >= certDurationMin * 0.7) {
                score += 10;
                warnings.push("기간 촉박");
            } else {
                score += 3;
                warnings.push("기간 매우 부족");
            }

            // 3. 배경 적합성 (20점)
            if (background === "비전공자") {
                if (cert.difficulty <= 3) {
                    score += 20;
                    reasons.push("✅ 비전공자 도전 적합");
                    highlights.push("입문 용이");
                } else if (cert.difficulty === 4) {
                    score += 12;
                    reasons.push("⚠️ 난이도 도전적");
                } else {
                    score += 8;
                    warnings.push("고난도 - 충분한 준비 필요");
                }
            } else if (background === "전공자") {
                if (cert.difficulty >= 3) {
                    score += 20;
                    reasons.push("✅ 전공 지식 활용");
                    highlights.push("전공 우대");
                } else {
                    score += 18;
                    reasons.push("✅ 수월한 접근");
                }
            } else {
                score += 20;
                reasons.push("✅ 실무 경험 활용");
                highlights.push("경력 활용");
            }

            // 4. 현재 상황 (15점)
            if (employment === "직장인") {
                if (cert.difficulty <= 2) {
                    score += 15;
                    reasons.push("✅ 직장 병행 적합");
                } else if (cert.difficulty === 3) {
                    score += 12;
                    reasons.push("⚠️ 병행 가능 (시간관리 필요)");
                } else {
                    score += 7;
                    warnings.push("병행 어려움");
                }
            } else if (employment === "취업준비생") {
                score += 15;
                reasons.push("✅ 풀타임 집중 가능");
                highlights.push("집중 학습");
            } else if (employment === "학생") {
                if (cert.difficulty <= 3) {
                    score += 13;
                    reasons.push("✅ 학업 병행 가능");
                } else {
                    score += 8;
                    warnings.push("학업과 부담될 수 있음");
                }
            } else {
                score += 14;
                reasons.push("✅ 유연한 일정 가능");
            }

            // 5. 목표 적합성 (10점)
            if (goal === "고소득" && (cert.salary?.senior >= 7000 || cert.tags?.includes("고소득"))) {
                score += 10;
                reasons.push("💰 고소득 달성 가능");
                highlights.push("고소득");
            } else if (goal === "안정적 취업" && (cert.tags?.includes("공기업") || cert.tags?.includes("안정") || cert.outlook >= 4)) {
                score += 10;
                reasons.push("🏢 안정적 취업 유리");
                highlights.push("취업 유리");
            } else if (goal === "이직/전환" && cert.outlook >= 4) {
                score += 10;
                reasons.push("🔄 커리어 전환 효과적");
                highlights.push("이직 유리");
            } else if (goal === "창업" && (cert.tags?.includes("창업") || cert.tags?.includes("전문직"))) {
                score += 10;
                reasons.push("🚀 독립/창업 가능");
                highlights.push("창업 가능");
            }

            // 6. 관심분야 매칭 (10점)
            if (interests && interests.length > 0) {
                const interestMap = {
                    "회계/세무": ["회계", "세무", "감사"],
                    "법률": ["법률", "등기", "소송"],
                    "부동산": ["부동산", "중개", "감정"],
                    "IT/데이터": ["IT", "개발", "데이터", "AI"],
                    "안전/설비": ["안전", "소방", "전기", "위험물"],
                    "금융/투자": ["금융", "투자", "보험"],
                    "물류/무역": ["물류", "무역", "관세"],
                    "상담/복지": ["상담", "심리", "복지"]
                };
                let matched = false;
                interests.forEach(interest => {
                    const keywords = interestMap[interest] || [interest];
                    if (cert.tags?.some(tag => keywords.some(k => tag.includes(k)))) matched = true;
                });
                if (matched) {
                    score += 10;
                    reasons.push("❤️ 관심 분야 일치");
                    highlights.push("관심 분야");
                }
            }

            // 예산 체크 (비용 범위의 최대값과 비교)
            const costStr = cert.cost?.total || "100만원";
            const costNumbers = costStr.match(/\d+/g);
            const maxCost = costNumbers ? Math.max(...costNumbers.map(Number)) : 100;
            if (maxCost > maxBudget) {
                score -= 10;
                warnings.push(`예산 초과 (${cert.cost?.total})`);
            }

            // 뱃지 보너스
            if (cert.badge) {
                score += 3;
                highlights.push(cert.badge);
            }

            if (score >= 40) {
                const matchLevel = score >= 85 ? "최적" : score >= 70 ? "추천" : score >= 55 ? "적합" : "도전";
                const matchGradient = {
                    "최적": "from-violet-500 to-purple-600",
                    "추천": "from-emerald-500 to-teal-600",
                    "적합": "from-amber-500 to-orange-600",
                    "도전": "from-pink-500 to-rose-600"
                };
                results.push({
                    name, ...cert,
                    score,
                    reasons: reasons.slice(0, 4),
                    warnings: warnings.slice(0, 2),
                    highlights: highlights.slice(0, 3),
                    matchLevel,
                    matchGradient: matchGradient[matchLevel]
                });
            }
        });

        return results.sort((a, b) => b.score - a.score).slice(0, 8);
    }

                                                        <div

                                                                    className="w-8 h-8 bg-rose-500 text-white rounded-lg flex items-center justify-center text-sm">📍</span>
                                                                지역별 선발인원

                                                            <div className="grid grid-cols-3 md:grid-cols-5 gap-3">
                                                                {selectedCert.examInfo.regions.map((r, i) => (
                                                                    <div key={i}
                                                                         className="text-center p-4 bg-gradient-to-br from-rose-50 to-pink-50 rounded-xl border border-rose-100 hover:shadow-md transition-shadow">
                                                                        <div
                                                                            className="text-sm text-gray-600 mb-1">{r.region}</div>
                                                                        <div
                                                                            className="text-xl font-black text-rose-600">{r.quota}명
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* 시험 일정 */}

                                                        className="bg-gradient-to-br from-purple-50 to-fuchsia-50 rounded-2xl p-6 border border-purple-100">
                                                        <h4 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                                                            <span
                                                                className="w-8 h-8 bg-purple-500 text-white rounded-lg flex items-center justify-center text-sm">📅</span>
                                                            시험 일정 및 준비 정보
                                                        </h4>
                                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                            <div
                                                                className="bg-white rounded-xl p-4 border border-purple-100 text-center">
                                                                <div
                                                                    className="text-purple-600 text-sm font-semibold mb-2">시험
                                                                    일정
                                                                </div>
                                                                <div
                                                                    className="text-gray-800 font-bold">{selectedCert.examSchedule?.round || selectedCert.examSchedule?.date || `${selectedCert.examSchedule?.year || 2025}년`}</div>
                                                            </div>
                                                            <div
                                                                className="bg-white rounded-xl p-4 border border-purple-100 text-center">
                                                                <div
                                                                    className="text-purple-600 text-sm font-semibold mb-2">준비
                                                                    기간
                                                                </div>
                                                                <div
                                                                    className="text-gray-800 font-bold">{selectedCert.duration?.min}~{selectedCert.duration?.max}개월
                                                                </div>
                                                            </div>
                                                            <div
                                                                className="bg-white rounded-xl p-4 border border-purple-100 text-center">
                                                                <div
                                                                    className="text-purple-600 text-sm font-semibold mb-2">예상
                                                                    비용
                                                                </div>
                                                                <div
                                                                    className="text-gray-800 font-bold">{selectedCert.cost?.total}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </>
                                            )}

                                            {activeTab === 'pass' && (
                                                <>
                                                    {selectedCert.passHistory && selectedCert.passHistory.length > 0 ? (
                                                        <>
                                                            <div
                                                                className="bg-white rounded-2xl p-6 border-2 border-gray-100 shadow-sm">
                                                                <h4 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                                                                    <span
                                                                        className="w-8 h-8 bg-violet-500 text-white rounded-lg flex items-center justify-center text-sm">📊</span>
                                                                    연도별 합격자 현황
                                                                </h4>
                                                                <div className="overflow-x-auto">
                                                                    <table className="w-full text-sm">
                                                                        <thead>
                                                                        <tr className="bg-gradient-to-r from-violet-100 to-purple-100">
                                                                            <th className="px-4 py-3 text-left font-bold text-violet-700 rounded-tl-xl">연도</th>
                                                                            <th className="px-4 py-3 text-center font-bold text-violet-700">응시자</th>
                                                                            <th className="px-4 py-3 text-center font-bold text-violet-700">합격자</th>
                                                                            <th className="px-4 py-3 text-center font-bold text-violet-700 rounded-tr-xl">합격률</th>
                                                                        </tr>
                                                                        </thead>
                                                                        <tbody>
                                                                        {selectedCert.passHistory.map((h, i) => (
                                                                            <tr key={i}
                                                                                className={`border-t border-gray-100 ${i % 2 === 0 ? 'bg-gray-50' : 'bg-white'} hover:bg-violet-50 transition-colors`}>
                                                                                <td className="px-4 py-4 font-bold text-gray-800">{h.year}년</td>
                                                                                <td className="px-4 py-4 text-center text-gray-600">{(h.firstApplied || h.applied || 0).toLocaleString()}명</td>
                                                                                <td className="px-4 py-4 text-center text-emerald-600 font-semibold">{(h.firstPassed || h.passed || 0).toLocaleString()}명</td>
                                                                                <td className="px-4 py-4 text-center">
                                                                                    <span
                                                                                        className="px-3 py-1 bg-violet-100 text-violet-700 rounded-full font-bold">{h.firstRate || h.rate || '-'}%</span>
                                                                                </td>
                                                                            </tr>
                                                                        ))}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            </div>

                                                            {/* 합격률 분석 */}
                                                            <div
                                                                className="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-6 border border-emerald-100">
                                                                <h4 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                                                                    <span
                                                                        className="w-8 h-8 bg-emerald-500 text-white rounded-lg flex items-center justify-center text-sm">📈</span>
                                                                    합격률 분석
                                                                </h4>
                                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                                    <div
                                                                        className="bg-white rounded-xl p-4 text-center border border-emerald-100">
                                                                        <div className="text-gray-500 text-xs mb-1">평균
                                                                            합격률
                                                                        </div>
                                                                        <div
                                                                            className="text-2xl font-black text-emerald-600">{selectedCert.passRate?.overall || '-'}%
                                                                        </div>
                                                                    </div>
                                                                    <div
                                                                        className="bg-white rounded-xl p-4 text-center border border-emerald-100">
                                                                        <div
                                                                            className="text-gray-500 text-xs mb-1">난이도
                                                                        </div>
                                                                        <div
                                                                            className="text-xl font-bold text-gray-800">{difficultyConfig[selectedCert.difficulty]?.label}</div>
                                                                    </div>
                                                                    <div
                                                                        className="bg-white rounded-xl p-4 text-center border border-emerald-100">
                                                                        <div
                                                                            className="text-gray-500 text-xs mb-1">경쟁률
                                                                        </div>
                                                                        <div
                                                                            className="text-xl font-bold text-gray-800">{selectedCert.passRate?.overall ? Math.round(100 / selectedCert.passRate.overall) + ':1' : '-'}</div>
                                                                    </div>
                                                                    <div
                                                                        className="bg-white rounded-xl p-4 text-center border border-emerald-100">
                                                                        <div className="text-gray-500 text-xs mb-1">추천
                                                                            준비기간
                                                                        </div>
                                                                        <div
                                                                            className="text-xl font-bold text-gray-800">{selectedCert.duration?.optimal || '-'}개월
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <div
                                                            className="bg-gradient-to-br from-violet-50 via-purple-50 to-fuchsia-50 rounded-2xl p-8 border border-violet-200 text-center">
                                                            <div className="text-6xl mb-4">📊</div>
                                                            <h4 className="font-bold text-gray-800 text-xl mb-3">합격자
                                                                현황</h4>
                                                            <div
                                                                className="bg-white rounded-xl p-6 inline-block shadow-sm border border-violet-100">
                                                                <div className="text-gray-500 text-sm mb-2">전체 합격률</div>
                                                                <div
                                                                    className="text-4xl font-black text-violet-600">{selectedCert.passRate?.overall || '-'}%
                                                                </div>
                                                            </div>
                                                            <p className="text-gray-500 text-sm mt-4">상세 연도별 데이터가 준비
                                                                중입니다.</p>
                                                        </div>
                                                    )}
                                                </>
                                            )}

                                            {activeTab === 'faq' && (
                                                <>
                                                    {selectedCert.faq && selectedCert.faq.length > 0 ? (
                                                        <div className="space-y-4">
                                                            <div
                                                                className="bg-gradient-to-br from-amber-50 to-orange-50 rounded-2xl p-6 border border-amber-100">
                                                                <h4 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                                                                    <span
                                                                        className="w-8 h-8 bg-amber-500 text-white rounded-lg flex items-center justify-center text-sm">❓</span>
                                                                    자주 묻는 질문
                                                                </h4>
                                                                <div className="space-y-4">
                                                                    {selectedCert.faq.map((item, i) => (
                                                                        <div key={i}
                                                                             className="bg-white rounded-xl overflow-hidden border border-amber-100 shadow-sm">
                                                                            <div
                                                                                className="p-4 bg-gradient-to-r from-amber-100 to-orange-100">
                                                                                <div className="flex items-start gap-3">
                                                                                    <span
                                                                                        className="w-7 h-7 bg-amber-500 text-white rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0">Q</span>
                                                                                    <span
                                                                                        className="text-gray-800 font-semibold">{item.q}</span>
                                                                                </div>
                                                                            </div>
                                                                            <div className="p-4">
                                                                                <div className="flex items-start gap-3">
                                                                                    <span
                                                                                        className="w-7 h-7 bg-emerald-500 text-white rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0">A</span>
                                                                                    <span
                                                                                        className="text-gray-600 leading-relaxed">{item.a}</span>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div
                                                            className="bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50 rounded-2xl p-8 border border-amber-200 text-center">
                                                            <div className="text-6xl mb-4">❓</div>
                                                            <h4 className="font-bold text-gray-800 text-xl mb-3">자주 묻는
                                                                질문</h4>
                                                            <p className="text-gray-500">FAQ가 준비 중입니다.</p>
                                                            <div
                                                                className="mt-6 p-4 bg-white rounded-xl border border-amber-100 text-left max-w-md mx-auto">
                                                                <div className="text-amber-600 font-semibold mb-2">💡
                                                                    알아두면 좋은 정보
                                                                </div>
                                                                <ul className="text-sm text-gray-600 space-y-2">
                                                                    <li>• 준비
                                                                        기간: {selectedCert.duration?.min}~{selectedCert.duration?.max}개월
                                                                    </li>
                                                                    <li>• 월 권장
                                                                        학습시간: {selectedCert.monthlyHours?.recommended || 60}시간
                                                                    </li>
                                                                    <li>• 예상 비용: {selectedCert.cost?.total}</li>
                                                                    <li>•
                                                                        난이도: {difficultyConfig[selectedCert.difficulty]?.label}</li>
                                                                </ul>
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* 추가 도움말 */}
                                                    <div
                                                        className="bg-gradient-to-br from-violet-50 to-purple-50 rounded-2xl p-6 border border-violet-100">
                                                        <h4 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                                                            <span
                                                                className="w-8 h-8 bg-violet-500 text-white rounded-lg flex items-center justify-center text-sm">💬</span>
                                                            추가 문의
                                                        </h4>
                                                        <div
                                                            className="bg-white rounded-xl p-4 border border-violet-100">
                                                            <p className="text-gray-600 text-sm leading-relaxed">
                                                                더 궁금한 사항이 있으시면 시대에듀 고객센터(1522-1623)로 문의해 주세요.
                                                                전문 상담사가 친절하게 안내해 드립니다.
                                                            </p>
                                                        </div>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>

                                    <div className="mt-6 grid grid-cols-2 gap-3">
                                        <button
                                            className="py-4 rounded-2xl bg-gradient-to-r from-violet-500 to-purple-600 text-white font-bold shadow-xl shadow-violet-200 hover:shadow-2xl transition-all flex items-center justify-center gap-2">
                                            <Icon name="Play" className="w-5 h-5"/> 강의 보러가기
                                        </button>
                                        <button
                                            className="py-4 rounded-2xl border-2 border-gray-200 text-gray-700 font-semibold hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
                                            <Icon name="Book" className="w-5 h-5"/> 교재 보기
                                        </button>
                                    </div>
                                    <button
                                        className="w-full mt-3 py-3 rounded-2xl border-2 border-violet-200 text-violet-600 font-semibold hover:bg-violet-50 transition-all flex items-center justify-center gap-2">
                                        <Icon name="Phone" className="w-5 h-5"/> 전문 상담 신청
                                    </button>
                                </div>
                            ) : (
                                /* 결과 목록 */
                                <div className="p-6 animate-fadeIn">
                                    {/* 로딩 애니메이션 - 클로드 스타일 */}
                                    {isAnalyzing && visibleRecommendations.length === 0 && (
                                        <div className="flex flex-col items-center justify-center py-20">
                                            <div className="relative mb-8">
                                                {/* 클로드 스타일 펄싱 점들 */}
                                                <div className="flex items-center gap-1">
                                                    <span className="w-3 h-3 bg-[#D97757] rounded-full animate-pulse"
                                                          style={{
                                                              animationDelay: '0ms',
                                                              animationDuration: '1s'
                                                          }}></span>
                                                    <span className="w-3 h-3 bg-[#D97757] rounded-full animate-pulse"
                                                          style={{
                                                              animationDelay: '200ms',
                                                              animationDuration: '1s'
                                                          }}></span>
                                                    <span className="w-3 h-3 bg-[#D97757] rounded-full animate-pulse"
                                                          style={{
                                                              animationDelay: '400ms',
                                                              animationDuration: '1s'
                                                          }}></span>
                                                </div>
                                            </div>
                                            <h3 className="text-xl font-bold text-gray-800 mb-2">AI가 분석 중입니다</h3>
                                            <p className="text-gray-500 text-sm">귀하의 조건에 맞는 최적의 자격증을 찾고 있습니다...</p>
                                        </div>
                                    )}

                                    {/* 결과 표시 */}
                                    {visibleRecommendations.length > 0 && (
                                        <>
                                            <div className="text-center mb-6">
                                                <div
                                                    className="inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-violet-500 to-purple-600 rounded-full shadow-lg shadow-violet-200 mb-3">
                                                    <Icon name="Sparkles" className="w-4 h-4 text-white"/><span
                                                    className="text-white font-bold">AI 분석 완료!</span>
                                                </div>
                                                <h2 className="text-xl font-bold text-gray-800 mb-1">{userProfile.background} · {userProfile.employment} 맞춤
                                                    추천</h2>
                                                <p className="text-gray-500 text-sm">{userProfile.duration} /
                                                    하루 {userProfile.dailyHours}시간 / 예산 {userProfile.budget}</p>
                                            </div>

                                            <div className="space-y-3">
                                                {visibleRecommendations.map((cert, idx) => (
                                                    <div key={cert.name}
                                                         className="bg-white hover:bg-gray-50 rounded-2xl border-2 border-gray-100 hover:border-violet-300 p-4 transition-all shadow-sm hover:shadow-lg animate-slideInUp"
                                                         style={{animationDelay: `${idx * 0.1}s`}}>
                                                        <div className="flex items-start gap-4">
                                                            <div
                                                                className={`w-14 h-14 rounded-xl flex flex-col items-center justify-center flex-shrink-0 shadow-lg ${idx === 0 ? 'bg-gradient-to-br from-amber-400 to-orange-500 text-white' : idx === 1 ? 'bg-gradient-to-br from-gray-300 to-gray-400 text-white' : idx === 2 ? 'bg-gradient-to-br from-amber-600 to-amber-700 text-white' : 'bg-gray-100 text-gray-600'}`}>
                                                                <span
                                                                    className="text-[10px] font-medium opacity-80">추천</span>
                                                                <span
                                                                    className="text-lg font-extrabold">{idx + 1}순위</span>
                                                            </div>
                                                            <div className="flex-1 min-w-0">
                                                                <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                                    <span
                                                                        className={`px-2.5 py-0.5 text-xs font-semibold rounded-full ${categoryConfig[cert.category]?.bg} ${categoryConfig[cert.category]?.text}`}>{cert.category}</span>
                                                                    <span
                                                                        className={`px-2.5 py-0.5 text-xs font-bold rounded-full bg-gradient-to-r ${cert.matchGradient} text-white`}>{cert.matchLevel}</span>
                                                                    {cert.highlights?.slice(0, 2).map((h, i) => <span
                                                                        key={i}
                                                                        className="px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-600 font-medium">{h}</span>)}
                                                                </div>
                                                                <h3 className="text-lg font-bold text-gray-800">{cert.name}</h3>
                                                                <p className="text-sm text-gray-500 line-clamp-1">{cert.description}</p>
                                                                <div
                                                                    className="flex items-center gap-4 mt-2 text-xs text-gray-400 font-medium">
                                                                    <span>📅 {cert.duration?.min}~{cert.duration?.max}개월</span>
                                                                    <span>💰 {cert.cost?.total}</span>
                                                                    <span>📊 합격률 {cert.passRate?.overall || '-'}%</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col items-end gap-2">
                                                                <div
                                                                    className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-purple-600">{cert.score}</div>
                                                                <div className="flex gap-1">
                                                                    <button onClick={() => {
                                                                        setSelectedCert(cert);
                                                                        setActiveTab('overview');
                                                                        setIsFromAllCerts(false);
                                                                    }}
                                                                            className="px-4 py-2 text-xs bg-gradient-to-r from-violet-500 to-purple-600 text-white rounded-xl font-semibold shadow-lg hover:shadow-xl transition-all">상세보기
                                                                    </button>
                                                                    <button onClick={() => toggleCompare(cert)}
                                                                            className={`px-3 py-2 text-xs rounded-xl font-semibold transition-all ${compareList.find(c => c.name === cert.name) ? 'bg-pink-100 text-pink-600' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                                                                        {compareList.find(c => c.name === cert.name) ? '✓' : '+'}
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </>
                                    )}

                                    {!isAnalyzing && recommendations.length === 0 && (
                                        <div className="text-center py-12">
                                            <div className="text-5xl mb-3">🔍</div>
                                            <p className="text-gray-600 font-medium">조건에 맞는 자격증이 없습니다</p>
                                            <p className="text-gray-400 text-sm">조건을 완화해서 다시 검색해 보세요</p>
                                        </div>
                                    )}

                                    {!isAnalyzing && visibleRecommendations.length > 0 && (
                                        <div className="mt-6 grid grid-cols-2 gap-3">
                                            <button onClick={handleReset}
                                                    className="py-3 rounded-2xl border-2 border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition-all">다시
                                                검색
                                            </button>
                                            <button onClick={() => setShowAllCerts(true)}
                                                    className="py-3 rounded-2xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                                                <Icon name="Search" className="w-4 h-4"/> 전체 자격증
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {/* 푸터 */}
                    <footer className="mt-8 text-center">
                        <div className="flex justify-center gap-4 mb-4">
                            <a href="#"
                               className="text-gray-400 hover:text-violet-600 text-sm font-medium transition-colors">시대에듀
                                홈</a>
                            <span className="text-gray-300">|</span>
                            <a href="#"
                               className="text-gray-400 hover:text-violet-600 text-sm font-medium transition-colors">수강신청</a>
                            <span className="text-gray-300">|</span>
                            <a href="#"
                               className="text-gray-400 hover:text-violet-600 text-sm font-medium transition-colors">고객센터</a>
                        </div>
                        <p className="text-gray-400 text-sm">© 2025 시대에듀. All rights reserved.</p>
                        <p className="text-gray-300 text-xs mt-1">AI 추천은 참고용이며, 최종 결정은 전문 상담을 권장합니다.</p>
                    </footer>
                </div>

                <style>{`
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
            input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #f59e0b); cursor: pointer; box-shadow: 0 4px 12px rgba(249,115,22,0.4); }
            input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #f59e0b); cursor: pointer; border: none; }
          `}</style>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SidaeAIRecommender));
</script>
</body>
</html>
